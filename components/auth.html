<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account - MApp</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card__logo">MApp</div>
            <h1 class="auth-card__title">Create an account</h1>
            <p class="auth-card__subtitle">Enter your email to sign up for this app</p>
            
            <form class="auth-form">
                <input type="email" class="auth-form__input" placeholder="email@domain.com" required>
                <button type="submit" class="auth-form__button">Sign up with email</button>
                
                <div class="auth-form__divider">or continue with</div>
                
                <button type="button" class="auth-form__google-btn">
                    <span>🔍</span>
                    <span>Google</span>
                </button>
            </form>
            
            <div class="auth-card__terms">
                By clicking continue, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>
</body>
</html>

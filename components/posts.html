<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="posts-container">
        <div class="posts-grid">
            <!-- Post 1 -->
            <article class="post-card">
                <div class="post-header">
                    <div class="post-author">
                        <img src="../assets/images/avatar1.jpg" alt="Helena" class="post-avatar">
                        <div class="post-author-info">
                            <div class="post-author-name">Helena</div>
                            <div class="post-author-time">2 days ago</div>
                        </div>
                    </div>
                    <div class="post-menu">⋯</div>
                </div>
                <img src="../assets/images/post1.jpg" alt="Post 1" class="post-image">
                <div class="post-description">
                    <strong>Post description</strong>
                </div>
                <div class="post-footer">
                    <div class="post-stats">
                        <span>❤️ 2 likes</span>
                        <span>💬 1 comments</span>
                    </div>
                </div>
            </article>

            <!-- Post 2 -->
            <article class="post-card">
                <div class="post-header">
                    <div class="post-author">
                        <img src="../assets/images/avatar3.jpg" alt="Daniel" class="post-avatar">
                        <div class="post-author-info">
                            <div class="post-author-name">Daniel</div>
                            <div class="post-author-time">5 days ago</div>
                        </div>
                    </div>
                    <div class="post-menu">⋯</div>
                </div>
                <img src="../assets/images/post2.jpg" alt="Post 2" class="post-image">
                <div class="post-description">
                    <strong>Post description</strong>
                </div>
                <div class="post-footer">
                    <div class="post-stats">
                        <span>❤️ 1 likes</span>
                        <span>💬 4 comments</span>
                    </div>
                </div>
            </article>

            <!-- Post 3 -->
            <article class="post-card">
                <div class="post-header">
                    <div class="post-author">
                        <img src="../assets/images/avatar2.jpg" alt="Oscar" class="post-avatar">
                        <div class="post-author-info">
                            <div class="post-author-name">Oscar</div>
                            <div class="post-author-time">1 week ago</div>
                        </div>
                    </div>
                    <div class="post-menu">⋯</div>
                </div>
                <img src="../assets/images/post3.jpg" alt="Post 3" class="post-image">
                <div class="post-description">
                    <strong>Post description</strong>
                </div>
                <div class="post-footer">
                    <div class="post-stats">
                        <span>❤️ 3 likes</span>
                        <span>💬 7 comments</span>
                    </div>
                </div>
            </article>
        </div>
    </div>
</body>
</html>

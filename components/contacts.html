<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

                    <img src="../assets/images/avatar1.jpg" alt="Helena" class="contact-avatar">

                <li class="contact-item">
                    <img src="../assets/images/avatar2.jpg" alt="Oscar" class="contact-avatar">

                        <div class="contact-name">Oscar</div>

                    </div>
                </li>
                <li class="contact-item">
                    <img src="../assets/images/avatar3.jpg" alt="Daniel" class="contact-avatar">
                    <div class="contact-info">
                        <div class="contact-name">Daniel</div>
                        <div class="contact-email">email@domain.com.net</div>
                    </div>
                </li>
                <li class="contact-item">
                    <img src="../assets/images/avatar4.jpg" alt="Daniel Jay Park" class="contact-avatar">
                    <div class="contact-info">
                        <div class="contact-name">Daniel Jay Park</div>
                        <div class="contact-email">email@domain.com.net</div>
                    </div>
                </li>
                <li class="contact-item">
                    <img src="../assets/images/avatar5.jpg" alt="Mark Rojas" class="contact-avatar">

</html>
